schema_version: 1

context:
  python_min: "3.10"
  name: baybe
  version: "0.14.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/baybe-${{ version }}.tar.gz
  sha256: d35f05505734ac2e79f035762b6c1368ecbe71ad7f2948782cb716be19aff27a

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python 3.10.*
    - setuptools >=45
    - setuptools-scm >=6.2
    - pip
  run:
    - joblib >1.4.0,<2
    - typing_extensions >=4.7.0
    - python >=${{ python_min }},<3.13
    - attrs >=25.4.0
    - botorch >=0.13.0,<1
    - cattrs >=25.2.0
    - exceptiongroup
    - funcy >=1.17,<2
    - gpytorch >=1.9.1,<2
    - ngboost >=0.3.12,<1
    - numpy >=1.24.1,<3
    - pandas >=1.4.2,<3
    - protobuf >=3.20.3
    - scikit-learn >=1.1.1,<2
    - scipy >=1.10.1
    - setuptools-scm >=7.1.0
    - pytorch >=1.13.1,<3
    - typing-extensions >=4.7.0
    - opentelemetry-sdk >=1.16.0,<2
    - opentelemetry-propagator-aws-xray >=1.0.0,<2
    - opentelemetry-exporter-otlp >=1.16.0,<2
    - opentelemetry-sdk-extension-aws >=2.0.0,<3

tests:
  - python:
      imports:
        - baybe
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: A Bayesian Back End for Design of Experiments
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://emdgroup.github.io/baybe/

extra:
  recipe-maintainers:
    - jan-janssen
